name: SleepBetter
options:
  bundleIdPrefix: com.ggsheng
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "9L6N2ZF26B"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGNING_ALLOWED: YES

packages:
  SnapKit:
    url: https://github.com/SnapKit/SnapKit
    from: "5.6.0"

targets:
  SleepBetter:
    type: application
    platform: iOS
    sources:
      - path: SleepBetter/Sources
      - path: SleepBetter/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.SleepBetter
        INFOPLIST_FILE: SleepBetter/Sources/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: SleepBetter/Sources/App/SleepBetter.entitlements
        GENERATE_INFOPLIST_FILE: NO
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: NO
        Release:
          CODE_SIGNING_ALLOWED: YES
    dependencies:
      - package: SnapKit
    entitlements:
      path: SleepBetter/Sources/App/SleepBetter.entitlements
      properties: {}

  SleepBetterUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SleepBetterUITests
    settings:
      base:
        INFOPLIST_FILE: SleepBetterUITests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.SleepBetterUITests
        PRODUCT_NAME: SleepBetterUITests
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "9L6N2ZF26B"
    dependencies:
      - target: SleepBetter

schemes:
  SleepBetter:
    build:
      targets:
        SleepBetter: all
        SleepBetterUITests: test
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SleepBetterUITests
    archive:
      config: Release